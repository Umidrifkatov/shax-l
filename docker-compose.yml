version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ezoz_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ezoz_network

  web:
    build: .
    container_name: ezoz_web
    command: /app/scripts/entrypoint.sh
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - ezoz_network

networks:
  ezoz_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume:
